<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMSZKI 100 – 3D lapozás</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="scene" class="idle">
        <div id="book" class="closed-front">
            <div id="bookmark" title="Ugrás a Tartalomhoz">TARTALOM</div>

            <div id="static-left" class="static-page"></div>
            <div id="static-right" class="static-page"></div>

            <div id="flip-layer">
                <div id="flip-front" class="flip-face"></div>
                <div id="flip-back" class="flip-face"></div>
            </div>
        </div>
    </div>
    
    <div id="touch-indicator">Érintsd meg a képernyőt a könyv olvasásához</div>

    <div id="info-modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">&times;</div>
            <div class="modal-title" id="modal-title">Név</div>
            
            <div class="modal-layout">
                <img id="modal-img" src="" alt="Kép">
                <div class="modal-body" id="modal-body">Érdekességek...</div>
            </div>
        </div>
    </div>

    <!-- Szerzői vízjel a lap alján -->
    <footer>UMSZKI 100 Könyv – Kolonics Márk</footer>

    <script src="script.js"></script>
</body>

</html>

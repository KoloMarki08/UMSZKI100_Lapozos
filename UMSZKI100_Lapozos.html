<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMSZKI 100 – 3D lapozás</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --desk-dark: #1a0f05;
            --desk-mid: #3b2209;
            --page-w: 380px;
            --page-h: 520px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Crimson Text', Georgia, serif;
            background: radial-gradient(ellipse at 40% 60%, var(--desk-mid) 0%, var(--desk-dark) 70%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(87deg, transparent, transparent 28px, rgba(0, 0, 0, .07) 28px, rgba(0, 0, 0, .07) 29px),
                repeating-linear-gradient(177deg, transparent, transparent 28px, rgba(0, 0, 0, .05) 28px, rgba(0, 0, 0, .05) 29px);
            pointer-events: none;
        }

        #scene {
            position: relative;
            perspective: 1800px;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), filter 1.2s ease;
            z-index: 5;
        }

        #scene.idle {
            transform: scale(0.65) translateY(20vh) rotateX(15deg);
            filter: brightness(0.4);
            pointer-events: none; 
        }

        /* TÖRÖLVE a "contain: layout paint;", így kilóg a könyvjelző! */
        #book {
            position: relative;
            width: calc(var(--page-w) * 2);
            height: var(--page-h);
            cursor: grab;
            transition: transform 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease-in-out;
        }

        /* --- KÖZÉPRE IGAZÍTÁS ZÁRT ÁLLAPOTBAN --- */
        #book.closed-front {
            transform: translateX(calc(var(--page-w) * -0.5));
        }

        #book.closed-back {
            transform: translateX(calc(var(--page-w) * 0.5));
        }

        #book:active {
            cursor: grabbing;
        }

        /* --- ÁRNYÉK LOGIKA (Csukott állapotban eltűnik) --- */
        #book::before {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateY(26px);
            background: rgba(0, 0, 0, .38);
            box-shadow: 0 30px 60px rgba(0, 0, 0, .85);
            filter: blur(8px);
            z-index: -1;
            pointer-events: none;
            width: 100%;
            left: 0;
            transition: opacity 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), left 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        #book.closed-front::before,
        #book.closed-back::before {
            opacity: 0; /* Teljesen eltűnik az árnyék! */
        }

        #touch-indicator {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d4af37;
            font-family: 'IM Fell English', serif;
            font-size: 26px;
            letter-spacing: 3px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 10;
        }

        #scene.idle + #touch-indicator {
            opacity: 1;
            animation: pulseText 2s infinite alternate ease-in-out;
        }

        @keyframes pulseText {
            from { transform: translate(-50%, -50%) scale(0.95); text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
            to { transform: translate(-50%, -50%) scale(1.05); text-shadow: 0 4px 20px rgba(212, 175, 55, 0.6); }
        }

        /* --- KÖNYVJELZŐ STÍLUS --- */
        #bookmark {
            position: absolute;
            top: 25px;
            right: -30px; /* Kilóg a könyvből */
            width: 30px;
            height: 150px;
            background: #901a1e;
            color: #f1e5c9;
            font-family: 'IM Fell English', serif;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 3px;
            z-index: 0; 
            transition: right 0.2s ease, background 0.2s ease, opacity 0.3s ease;
        }

        #bookmark:hover {
            right: -33px; 
            background: #b02025;
        }

        /* A könyvjelző eltűnik, ha a hátsó borítón vagyunk */
        #book.closed-back #bookmark {
            opacity: 0;
            pointer-events: none;
        }

        .static-page {
            position: absolute;
            top: 0;
            width: var(--page-w);
            height: var(--page-h);
            overflow: hidden;
            z-index: 1;
        }

        #static-left { left: 0; }
        #static-right { left: var(--page-w); }

        #flip-layer {
            position: absolute;
            top: 0;
            width: var(--page-w);
            height: var(--page-h);
            z-index: 10;
            display: none;
            transform-style: preserve-3d;
            will-change: transform;
            pointer-events: none;
            contain: layout paint;
        }

        #flip-layer.forward {
            left: var(--page-w);
            transform-origin: left center;
        }

        #flip-layer.backward {
            left: 0;
            transform-origin: right center;
        }

        .flip-face {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform-style: preserve-3d;
            will-change: transform;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .18);
            contain: layout paint;
        }

        #flip-front { transform: translateZ(1px); }
        #flip-back { transform: rotateY(180deg) translateZ(1px); }

        #flip-layer.dragging .flip-face { box-shadow: 0 5px 12px rgba(0, 0, 0, .14); }

        .page-content {
            width: 100%;
            height: 100%;
            padding: 36px 32px 44px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 22px rgba(0, 0, 0, .06); /* Bekerült ide, hogy az átlátszó oldalon ne legyen látható keret */
        }

        .lined::before {
            content: '';
            position: absolute;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: repeating-linear-gradient(transparent,
                    transparent 31px,
                    rgba(0, 0, 0, .1) 31px,
                    rgba(0, 0, 0, .1) 32px);
            pointer-events: none;
            z-index: 0;
        }

        .page-header {
            font-family: 'IM Fell English', serif;
            font-size: 9px;
            letter-spacing: 4px;
            color: #aaa;
            text-transform: uppercase;
            text-align: center;
            border-bottom: .5px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 16px;
        }

        .chapter-title {
            font-family: 'IM Fell English', serif;
            font-size: 22px;
            color: #2a1a0a;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .chapter-year {
            font-size: 12px;
            letter-spacing: 3px;
            color: #999;
            margin-bottom: 16px;
        }

        .chapter-body {
            font-size: 15px;
            line-height: 1.85;
            color: #3a2a18;
            text-align: justify;
            position: relative;
            z-index: 1;
        }

        .drop-cap::first-letter {
            font-family: 'IM Fell English', serif;
            font-size: 52px;
            float: left;
            line-height: .8;
            margin: 4px 8px 0 0;
            color: #2a1a0a;
        }

        .page-num {
            position: absolute;
            bottom: 14px;
            font-size: 11px;
            letter-spacing: 2px;
            color: #999;
        }

        .page-num.left { left: 30px; }
        .page-num.right { right: 30px; }

        /* --- Átlátszó oldal a csukott könyvhöz --- */
        .era-transparent {
            background: transparent !important;
            box-shadow: none !important;
        }
        .era-transparent.lined::before {
            display: none !important;
        }

        .era-cover {
            background: linear-gradient(135deg, #18253b 0%, #0a111a 100%);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            border-left: 2px solid #05080c;
        }
        .era-cover.lined::before { display: none !important; }

        .era-1920 { background: #f0e6cc; }

        .era-1950 {
            background: #dde8f5;
            background-image:
                linear-gradient(rgba(0, 0, 200, .08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 200, .08) 1px, transparent 1px);
            background-size: 22px 22px;
            background-position: 0 76px;
        }

        .era-1990 {
            background: #f8f8f4;
            border-left: 10px dotted #d0d0c8;
        }

        .era-2000 {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .toc-link, .info-link {
            color: #8c7340;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
            z-index: 20;
            text-decoration: underline;
            text-decoration-color: rgba(140, 115, 64, 0.4);
        }

        .toc-link:hover, .info-link:hover {
            color: #d4af37;
            text-decoration-color: #d4af37;
        }

        #info-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none; 
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #info-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #f0e6cc;
            padding: 30px 40px;
            border-radius: 6px;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            border: 2px solid #a08c5b;
            text-align: center;
            position: relative;
            font-family: 'Crimson Text', Georgia, serif;
            max-height: 90vh;
            overflow-y: auto; 
        }

        .modal-close {
            position: absolute;
            top: 10px; right: 20px;
            cursor: pointer;
            font-size: 28px;
            color: #555;
            transition: color 0.2s;
        }

        .modal-close:hover { color: #000; }

        .modal-title {
            font-family: 'IM Fell English', serif;
            font-size: 26px;
            color: #2a1a0a;
            margin-bottom: 15px;
            border-bottom: 1px solid #d0c5ab;
            padding-bottom: 10px;
        }

        .modal-layout {
            display: flex;
            align-items: flex-start;
            gap: 20px; 
            text-align: left;
        }

        #modal-img {
            max-width: 140px; 
            height: auto;
            flex-shrink: 0; 
            border-radius: 4px;
            border: 2px solid #d0c5ab;
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .modal-body {
            font-size: 16px;
            color: #3a2a18;
            line-height: 1.6;
            text-align: justify;
            flex-grow: 1; 
        }

        @media (max-width: 860px) {
            :root { --page-w: 280px; --page-h: 420px; }
            .chapter-title { font-size: 19px; }
            .chapter-body { font-size: 13px; }
            .modal-content { padding: 20px; }
            .modal-layout { flex-direction: column; align-items: center; gap: 15px; }
            #modal-img { max-width: 180px; }
            #bookmark { right: -20px; padding: 10px 0; font-size: 10px; width: 25px; top: 15px; height: 100px;}
            #bookmark:hover { right: -25px; }
        }
    </style>
</head>

<body>
    <div id="scene" class="idle">
        <div id="book" class="closed-front">
            <div id="bookmark" title="Ugrás a Tartalomhoz">TARTALOM</div>

            <div id="static-left" class="static-page"></div>
            <div id="static-right" class="static-page"></div>

            <div id="flip-layer">
                <div id="flip-front" class="flip-face"></div>
                <div id="flip-back" class="flip-face"></div>
            </div>
        </div>
    </div>
    
    <div id="touch-indicator">Érintsd meg a képernyőt a könyv olvasásához</div>

    <div id="info-modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">&times;</div>
            <div class="modal-title" id="modal-title">Név</div>
            
            <div class="modal-layout">
                <img id="modal-img" src="" alt="Kép">
                <div class="modal-body" id="modal-body">Érdekességek...</div>
            </div>
        </div>
    </div>

    <script>
        const spreads = [
            // SPREAD 0: ZÁRT KÖNYV (ELÜLSŐ BORÍTÓ) - Bal oldal átlátszó
            {
                leftEraCss: 'era-transparent',
                rightEraCss: 'era-cover',
                left: ``,
                right: `
                    <div style="text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px;">
                        <h1 style="font-family: 'IM Fell English', serif; font-size: 38px; color: #d4af37; margin-bottom: 35px; text-shadow: 2px 2px 6px rgba(0,0,0,0.9); letter-spacing: 2px;">UMSZKI 100</h1>
                        
                        <img src="umszki_logo.jpg" alt="UMSZKI Logo" style="width: 170px; height: 170px; border-radius: 50%; margin: 0 auto 35px; box-shadow: 0 12px 25px rgba(0,0,0,0.8), 0 0 0 3px #d4af37;">
                        
                        <h2 style="font-family: 'Crimson Text', serif; font-size: 20px; color: #f1e5c9; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase;">Történelmi Archívum</h2>
                        <div style="width: 50px; height: 2px; background-color: #a08c5b; margin: 0 auto 15px;"></div>
                        <p style="font-family: 'IM Fell English', serif; font-size: 18px; color: #d4af37; letter-spacing: 5px;">1927 - 2027</p>
                    </div>
                `
            },
            // SPREAD 1: KINYITOTT KÖNYV - ELŐSZÓ ÉS TARTALOM
            {
                leftEraCss: 'era-1920',
                rightEraCss: 'era-1920',
                left:`
                    <div class="page-header">UMSZKI 100 – TÖRTÉNELMI ARCHÍVUM <br>1927-2027</div>
                    <div class="chapter-title">Előszó</div>
                    <div class="chapter-year">A Szerkesztőség</div>
                    <div class="chapter-body drop-cap">Ez a kötet száz esztendő emlékeit foglalja magában. Egy évszázadnyi tudás, közösség és szakmai fejlődés krónikája olvasható ezeken a lapokon.</div>
                    <div class="page-num left">1</div>
                `,
                // data-target="hanyadik spread"
                right:`
                    <div class="page-header">UMSZKI 100 – TÖRTÉNELMI ARCHÍVUM <br>1927-2027</div>
                    <div class="chapter-title">Tartalom</div>
                    <div class="chapter-year">Kattints a fejezetre az ugráshoz</div>
                    <div class="chapter-body" style="font-size:14px;line-height:2.4;">
                        <span class="toc-link" data-target="2">I. Az alapítás kora — 1927–1944</span><br>
                        <span class="toc-link" data-target="4">II. Újjáépítés és Landler-korszak</span><br>
                        <span class="toc-link" data-target="5">III. Az informatika hajnala</span><br>
                    </div>
                    <div class="page-num right">2</div>
                `
            },
            // SPREAD 2: I. FEJEZET KEZDETE
            {
                leftEraCss: 'era-1920',
                rightEraCss: 'era-1920',
                left: `
                    <div class="page-header">I. FEJEZET – AZ ALAPÍTÁS KORA</div>
                    <div class="chapter-title">Az alapítás előzményei</div>
                    <div class="chapter-body drop-cap">Az intézmény 1927-ben nyitotta meg kapuit. Ebben a nehéz, de reménnyel teli időszakban hatalmas szükség volt jól képzett műszaki szakemberekre.</div>
                    <div class="page-num left">3</div>
                `,
                right:`
                    <div class="page-header">I. FEJEZET – AZ ALAPÍTÁS KORA</div>
                    <div class="chapter-title">Az első évek</div>
                    <div class="chapter-body">A kezdeti években az iskola épülete még másként festett, de a tanárok elhivatottsága már akkor is a maihoz volt mérhető. A diákok kemény fizikai és szellemi munkával sajátították el az ipari alapismereteket. <br><br>Az első tantervek még a gépészetre fókuszáltak...</div>
                    <div class="page-num right">4</div>
                `
            },
            // SPREAD 3: I. FEJEZET (Folytatás)
            {
                leftEraCss: 'era-1920',
                rightEraCss: 'era-1920',
                left: `
                    <div class="page-header">I. FEJEZET – AZ ALAPÍTÁS KORA</div>
                    <div class="chapter-body">...mivel abban az időben az ipar gerincét a gépgyártás és a fémfeldolgozás adta. Hamarosan azonban nyilvánvalóvá vált, hogy a technológia gyorsuló ütemben fejlődik.<br><br>Az 1930-as évekre az iskola laboratóriumai és műhelyei folyamatosan bővültek. Új esztergagépek és mérőműszerek érkeztek, melyek mind a gyakorlati oktatás magas színvonalát szolgálták.</div>
                    <div class="page-num left">5</div>
                `,
                right: `
                    <div class="page-header">I. FEJEZET – AZ ALAPÍTÁS KORA</div>
                    <div class="chapter-title">A háború vihara</div>
                    <div class="chapter-body">Az 1940-es évek elejére az intézmény életére sötét árnyékot vetettek a világesemények. Az oktatást egyre nehezebb volt fenntartani, mégis a falak között mindvégig megmaradt a szolidaritás és a tudás tisztelete.</div>
                    <div class="page-num right">6</div>
                `
            },
            // SPREAD 4: II. FEJEZET
            {
                leftEraCss: 'era-1950',
                rightEraCss: 'era-1950',
                left: `
                    <div class="page-header">II. FEJEZET – ÚJJÁÉPÍTÉS</div>
                    <div class="chapter-title">Új korszak</div>
                    <div class="chapter-body drop-cap">A háború utáni években az iskola története új fejezethez érkezett. A romok eltakarítása után az oktatás soha nem látott lendülettel indult újra.</div>
                    <div class="page-num left">7</div>
                `,
                right:`
                    <div class="page-header">II. FEJEZET – ÚJJÁÉPÍTÉS</div>
                    <div class="chapter-title">Landler-korszak</div>
                    <div class="chapter-body">A technikai oktatás szerepe egyre hangsúlyosabbá vált. Ebben a korszakban az intézmény <span class="info-link" data-name="Landler Jenő" data-info="Landler Jenő (1875–1928) ügyvéd és politikus. Az iskola 1950 és 1990 között viselte a nevét (Landler Jenő Gép- és Híradásipari Technikum), ekkor vált az intézmény a hazai híradástechnikai oktatás legfontosabb központjává." data-img="KEPEK/landler_jeno.jpg">Landler Jenő</span> nevét viselte, és óriási fejlődésen ment keresztül a híradástechnika irányába.</div>
                    <div class="page-num right">8</div>
                `
            },
            // SPREAD 5: III. FEJEZET
            {
                leftEraCss: 'era-1990',
                rightEraCss: 'era-1990',
                left:`
                    <div class="page-header">III. FEJEZET – INFORMATIKA</div>
                    <div class="chapter-title">Az informatika hajnala</div>
                    <div class="chapter-body drop-cap">A számítógépek megjelenése új irányt adott az oktatásnak az 1980-as és 90-es évek fordulóján. Megjelentek az első PC-k a tantermekben.</div>
                    <div class="page-num left">9</div>
                ` ,
                right:`
                    <div class="page-header">III. FEJEZET – INFORMATIKA</div>
                    <div class="chapter-title">Modern eszközök</div>
                    <div class="chapter-body">A műszaki képzés egyre jobban összekapcsolódott a digitális világgal. A programozás és a hálózatépítés az alaptanterv része lett.</div>
                    <div class="page-num right">10</div>
                ` 
            },
            // SPREAD 6: HÁTSÓ BORÍTÓ (ZÁRT KÖNYV) - Jobb oldal átlátszó
            {
                leftEraCss: 'era-cover',
                rightEraCss: 'era-transparent',
                left: `
                    <div style="height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20px; opacity: 0.6;">
                        <img src="umszki_logo.jpg" alt="UMSZKI Logo" style="width: 60px; height: 60px; border-radius: 50%; opacity: 0.3; margin-bottom: 15px; filter: grayscale(100%);">
                        <p style="color: #d4af37; font-size: 11px; letter-spacing: 2px; text-align: center; font-family: 'IM Fell English', serif;">Újpesti Két Tanítási Nyelvű<br>Műszaki Technikum</p>
                    </div>
                `,
                right: ``
            }
        ];

        const staticLeft = document.getElementById('static-left');
        const staticRight = document.getElementById('static-right');
        const flipLayer = document.getElementById('flip-layer');
        const flipFront = document.getElementById('flip-front');
        const flipBack = document.getElementById('flip-back');
        const book = document.getElementById('book');
        const scene = document.getElementById('scene');

        let currentSpread = 0;
        let isDragging = false;
        let isFlipping = false;
        let dragDirection = 0;
        let startX = 0;
        let dragProgress = 0;
        let wasDragged = false; 

        let rafId = null;
        let pendingTransform = '';

        function requestFullScreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(err => console.log("Hiba a teljes képernyő indításakor:", err));
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
            }
        }

        let idleTimeout;
        const IDLE_TIME_LIMIT = 10000; // TESZTÜZEMMÓD! Élesítéshez írd át: 900000 (15 perc)

        function wakeUpBook() {
            if (scene.classList.contains('idle')) {
                scene.classList.remove('idle');
            }
            resetIdleTimer();
        }

        function putDownBook() {
            closeModal();

            if (currentSpread !== 0) {
                jumpToSpread(0);
                setTimeout(() => {
                    scene.classList.add('idle');
                }, 350);
            } else {
                scene.classList.add('idle');
            }
        }

        function resetIdleTimer() {
            clearTimeout(idleTimeout);
            idleTimeout = setTimeout(putDownBook, IDLE_TIME_LIMIT);
        }

        ['pointerdown', 'pointermove', 'keydown', 'wheel', 'click'].forEach(evt => {
            window.addEventListener(evt, () => {
                requestFullScreen();
                if (scene.classList.contains('idle')) {
                    wakeUpBook();
                } else {
                    resetIdleTimer();
                }
            });
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                wakeUpBook();
            }, 600);
        });

        // --- ÚJ: Kezeli a könyv eltolását és árnyékát, ha valamelyik borítón vagyunk ---
        function updateBookState(targetIndex) {
            book.classList.remove('closed-front', 'closed-back');
            
            if (targetIndex === 0) {
                book.classList.add('closed-front');
            } else if (targetIndex === spreads.length - 1) {
                book.classList.add('closed-back');
            }
        }

        function pageHTML(index, side) {
            const spread = spreads[index];
            if (!spread) return '';

            const css = side === 'left' ? spread.leftEraCss : spread.rightEraCss;
            const content = side === 'left' ? spread.left : spread.right;

            // Ha átlátszó oldal, ne rajzoljon vonalakat se
            const linedClass = css === 'era-transparent' ? '' : 'lined';

            return `<div class="page-content ${css} ${linedClass}">${content}</div>`;
        }

        function renderSpread(index) {
            updateBookState(index);
            staticLeft.innerHTML = pageHTML(index, 'left');
            staticRight.innerHTML = pageHTML(index, 'right');
        }

        function applyFlipTransform(value) {
            pendingTransform = value;

            if (rafId) return;

            rafId = requestAnimationFrame(() => {
                flipLayer.style.transform = pendingTransform;
                rafId = null;
            });
        }

        function prepareFlip(direction) {
            flipLayer.style.display = 'block';
            flipLayer.style.transition = 'none';
            flipLayer.classList.add('dragging');

            if (direction === 1) {
                const nextSpread = currentSpread + 1;
                updateBookState(nextSpread); // Az árnyék és a csúsztatás előre elkezd mozogni

                staticLeft.innerHTML = pageHTML(currentSpread, 'left');
                staticRight.innerHTML = pageHTML(nextSpread, 'right');

                flipLayer.className = 'forward dragging';
                flipLayer.style.transform = 'translateZ(2px) rotateY(0deg)';

                flipFront.innerHTML = pageHTML(currentSpread, 'right');
                flipBack.innerHTML = pageHTML(nextSpread, 'left');
            } else {
                const prevSpread = currentSpread - 1;
                updateBookState(prevSpread); // Visszacsúsztatja, ha a borítóra érünk

                staticLeft.innerHTML = pageHTML(prevSpread, 'left');
                staticRight.innerHTML = pageHTML(currentSpread, 'right');

                flipLayer.className = 'backward dragging';
                flipLayer.style.transform = 'translateZ(2px) rotateY(0deg)';

                flipFront.innerHTML = pageHTML(currentSpread, 'left');
                flipBack.innerHTML = pageHTML(prevSpread, 'right');
            }
        }

        function finishFlip(direction) {
            currentSpread += direction;
            renderSpread(currentSpread);
            cleanupFlip();
            isFlipping = false;
        }

        function cleanupFlip() {
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
            updateBookState(currentSpread); // Visszaállítja a pozíciót, ha megszakadt a húzás

            flipLayer.className = '';
            flipLayer.style.display = 'none';
            flipLayer.style.transition = 'none';
            flipLayer.style.transform = '';
            flipFront.innerHTML = '';
            flipBack.innerHTML = '';
        }

        function animateFlip(direction, complete) {
            isFlipping = true;

            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }

            flipLayer.classList.remove('dragging');
            flipLayer.style.transition = 'transform .52s cubic-bezier(.25, .8, .25, 1)';

            requestAnimationFrame(() => {
                if (direction === 1) {
                    flipLayer.style.transform = complete
                        ? 'translateZ(2px) rotateY(-180deg)'
                        : 'translateZ(2px) rotateY(0deg)';
                } else {
                    flipLayer.style.transform = complete
                        ? 'translateZ(2px) rotateY(180deg)'
                        : 'translateZ(2px) rotateY(0deg)';
                }
            });

            window.setTimeout(() => {
                if (complete) {
                    finishFlip(direction);
                } else {
                    renderSpread(currentSpread);
                    cleanupFlip();
                    isFlipping = false;
                }
            }, 540);
        }

        function startDrag(e) {
            if (isFlipping || scene.classList.contains('idle')) return;

            // FONTOS JAVÍTÁS: Mindig lenullázzuk, hogy a könyvjelző-kattintás működjön
            wasDragged = false; 
            
            // Ha a könyvjelzőre nyomtunk, akkor ne próbáljon meg lapozni az ujjhúzással
            if (e.target.closest('#bookmark')) return;

            isDragging = true;
            dragDirection = 0;
            dragProgress = 0;
            startX = e.clientX;
        }

        function moveDrag(e) {
            if (!isDragging || isFlipping) return;

            const deltaX = e.clientX - startX;

            if (Math.abs(deltaX) > 10) {
                wasDragged = true; 
            }

            if (!dragDirection) {
                if (deltaX < -15 && currentSpread < spreads.length - 1) {
                    dragDirection = 1;
                    prepareFlip(1);
                } else if (deltaX > 15 && currentSpread > 0) {
                    dragDirection = -1;
                    prepareFlip(-1);
                }
            }

            if (!dragDirection) return;

            if (e.cancelable) e.preventDefault();

            dragProgress = Math.min(1, Math.max(0, Math.abs(deltaX) / (window.innerWidth * .32)));

            if (dragDirection === 1) {
                applyFlipTransform(`translateZ(2px) rotateY(${-180 * dragProgress}deg)`);
            } else {
                applyFlipTransform(`translateZ(2px) rotateY(${180 * dragProgress}deg)`);
            }
        }

        function endDrag() {
            if (!isDragging) return;

            isDragging = false;

            if (!dragDirection) return;

            const complete = dragProgress > .28;
            animateFlip(dragDirection, complete);

            dragDirection = 0;
            dragProgress = 0;
        }

        function jumpToSpread(index) {
            if (index === currentSpread || index < 0 || index >= spreads.length) return;
            
            book.style.opacity = '0';
            updateBookState(index);
            
            setTimeout(() => {
                currentSpread = index;
                renderSpread(currentSpread);
                cleanupFlip();
                book.style.opacity = '1';
            }, 300); 
        }

        function openModal(name, info, imageUrl) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-body').innerHTML = info;
            
            const modalImg = document.getElementById('modal-img');
            if (imageUrl) {
                modalImg.src = imageUrl;
                modalImg.style.display = 'block'; 
            } else {
                modalImg.style.display = 'none'; 
                modalImg.src = '';
            }
            
            document.getElementById('info-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('info-modal').classList.remove('active');
        }

        book.addEventListener('click', (e) => {
            if (wasDragged) return;

            // Könyvjelzőre kattintás kezelése - Ugrás az 1. oldalra (Tartalomjegyzék)
            if (e.target.closest('#bookmark')) {
                jumpToSpread(1); 
                return;
            }

            const tocLink = e.target.closest('.toc-link');
            if (tocLink) {
                const targetIndex = parseInt(tocLink.getAttribute('data-target'), 10);
                jumpToSpread(targetIndex);
                return;
            }

            const infoLink = e.target.closest('.info-link');
            if (infoLink) {
                const name = infoLink.getAttribute('data-name');
                const info = infoLink.getAttribute('data-info');
                const imageUrl = infoLink.getAttribute('data-img'); 
                
                openModal(name, info, imageUrl);
            }
        });

        document.getElementById('info-modal').addEventListener('click', (e) => {
            if (e.target.id === 'info-modal') {
                closeModal();
            }
        });

        renderSpread(currentSpread);

        book.addEventListener('pointerdown', startDrag);
        window.addEventListener('pointermove', moveDrag, { passive: false });
        window.addEventListener('pointerup', endDrag);
        window.addEventListener('pointercancel', endDrag);
    </script>
</body>

</html>

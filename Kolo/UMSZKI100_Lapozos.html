<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMSZKI 100 – 3D lapozás</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="scene" class="idle">
        <div id="book" class="closed-front">
            <div id="bookmark" title="Ugrás a Tartalomhoz">TARTALOM</div>

            <div id="static-left" class="static-page"></div>
            <div id="static-right" class="static-page"></div>

            <div id="flip-layer">
                <div id="flip-front" class="flip-face"></div>
                <div id="flip-back" class="flip-face"></div>
            </div>
        </div>
    </div>

    <div id="touch-indicator">Érintsd meg a képernyőt a könyv olvasásához</div>

    <div id="info-modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">&times;</div>
            <div class="modal-title" id="modal-title">Név</div>

            <div class="modal-layout">
                <img id="modal-img" src="" alt="Kép">
                <div class="modal-body" id="modal-body">Érdekességek...</div>
            </div>
        </div>
    </div>

    <template id="tpl-front-cover">
        <div
            style="text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px;">
            <h1
                style="font-family: 'IM Fell English', serif; font-size: 38px; color: #d4af37; margin-bottom: 35px; text-shadow: 2px 2px 6px rgba(0,0,0,0.9); letter-spacing: 2px;">
                UMSZKI 100</h1>
            <img src="umszki_logo.jpg" alt="UMSZKI Logo"
                style="width: 170px; height: 170px; border-radius: 50%; margin: 0 auto 35px; box-shadow: 0 12px 25px rgba(0,0,0,0.8), 0 0 0 3px #d4af37;">
            <h2
                style="font-family: 'Crimson Text', serif; font-size: 20px; color: #f1e5c9; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase;">
                Történelmi Archívum</h2>
            <div style="width: 50px; height: 2px; background-color: #a08c5b; margin: 0 auto 15px;"></div>
            <p style="font-family: 'IM Fell English', serif; font-size: 18px; color: #d4af37; letter-spacing: 5px;">
                1927 - 2027</p>
        </div>
    </template>

    <template id="tpl-back-cover">
        <div
            style="height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20px; opacity: 0.6;">
            <img src="umszki_logo.jpg" alt="UMSZKI Logo"
                style="width: 60px; height: 60px; border-radius: 50%; opacity: 0.3; margin-bottom: 15px; filter: grayscale(100%);">
            <p
                style="color: #d4af37; font-size: 11px; letter-spacing: 2px; text-align: center; font-family: 'IM Fell English', serif;">
                Újpesti Két Tanítási Nyelvű<br>Műszaki Technikum</p>
        </div>
    </template>

    <template id="tpl-text-page">
        <div class="header-area">
            <div class="page-header"></div>
            <div class="chapter-title"></div>
            <div class="chapter-year"></div>
        </div>
        <div class="chapter-body"></div>
        <div class="page-num"></div>
    </template>


    <footer>UMSZKI 100 Könyv – Kolonics Márk</footer>

    <script src="data.js"></script>
    <script src="builder.js"></script>
    <script src="app.js"></script>
</body>

</html>

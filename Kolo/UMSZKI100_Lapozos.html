<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMSZKI 100 – 3D lapozás</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="scene" class="idle">
        <div id="book" class="closed-front">
            <div id="bookmark" title="Ugrás a Tartalomhoz">TARTALOM</div>

            <div id="static-left" class="static-page"></div>
            <div id="static-right" class="static-page"></div>

            <div id="flip-layer">
                <div id="flip-front" class="flip-face"></div>
                <div id="flip-back" class="flip-face"></div>
            </div>
        </div>
    </div>

    <div id="touch-indicator">Érintsd meg a képernyőt a könyv olvasásához</div>

    <div id="info-modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">&times;</div>
            <div class="modal-title" id="modal-title">Név</div>
            <div class="modal-layout">
                <img id="modal-img" src="" alt="Kép">
                <div class="modal-body" id="modal-body">Érdekességek...</div>
            </div>
        </div>
    </div>

    <template id="tpl-front-cover">
        <div class="cover-front-container">
            <h1 class="cover-front-title">UMSZKI 100</h1>
            <img src="umszki_logo.jpg" onerror="this.src='https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=400&q=80'" alt="UMSZKI Logo" class="cover-front-logo">
            <h2 class="cover-front-subtitle">Történelmi Archívum</h2>
            <div class="cover-front-divider"></div>
            <p class="cover-front-date">1927 - 2027</p>
        </div>
    </template>

    <template id="tpl-back-cover">
        <div class="cover-back-container">
            <img src="umszki_logo.jpg" onerror="this.src='https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=400&q=80'" alt="UMSZKI Logo" class="cover-back-logo">
            <p class="cover-back-text">Újpesti Két Tanítási Nyelvű<br>Műszaki Technikum</p>
        </div>
    </template>

    <template id="tpl-image-page">
        <div class="image-page-layout">
            <div class="main-image-container"></div>
            <div class="pocket-container"></div>
        </div>
        <div class="page-num left"></div>
    </template>

    <template id="tpl-text-page">
        <div class="header-area">
            <div class="page-header"></div>
            <div class="chapter-title"></div>
            <div class="chapter-year"></div>
        </div>
        <div class="chapter-body"></div>
        <div class="page-num right"></div>
    </template>

    <footer>UMSZKI 100 Könyv – Kolonics Márk</footer>

    <script src="data.js"></script>
    <script src="builder.js"></script>
    <script src="app.js"></script>
</body>
</html>
